<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tradutor Tupi</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="papel" id="papel">
      <img src="papel.png" alt="Papel e mãos" />
      <div class="papel-conteudo">
        <p id="papel-txt">TRADUTOR TUPI</p>
        <button id="botao-jogar">Jogar</button>
      </div>
    </div>
    <div id="tela-menu" class="tela">
      <div class="menu-bg"></div>
    </div>
    <div id="tela-teclado" class="tela hidden">
      <img src="teclado.png" alt="posição das mãos no teclado" />
    </div>
    <div id="tela-jogo" class="tela hidden">
      <div class="cima">
        <div class="timer" id="timer">
          <p class="tempo-restante" id="tempo-restante">60</p>
        </div>
        <div class="balao-fala" id="balao-fala"></div>
      </div>
      <div class="baixo">
        <div class="pontos" id="pontos">0</div>
        <div class="container-textos">
          <div class="area-texto" id="texto-guia"></div>
          <div class="area-texto" id="texto-display"></div>
          <textarea
            class="area-texto"
            id="input"
            autofocus
            spellcheck="false"
          ></textarea>
        </div>
      </div>
    </div>
    <script src="main.js" defer></script>
  </body>
</html>
